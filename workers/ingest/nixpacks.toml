# Nixpacks build plan for the `worker` (BullMQ ingest) Railway service.
# Same install strategy as web; no Next.js build step needed. The worker uses
# tsx at runtime, so devDeps must remain installed (Nixpacks default — we do
# not `pnpm prune --prod`).

providers = ["node"]

[phases.setup]
nixPkgs = ["nodejs_22"]

[phases.install]
cmds = [
  "corepack enable",
  "corepack prepare --activate",
  "pnpm install --frozen-lockfile",
]

# Without an explicit build phase, Nixpacks auto-detects Turborepo and runs
# `npx turbo run build` which also builds @runspend/web. That build fails on
# the ingest service because no DATABASE_URL/AUTH_SECRET is present at build
# time. Filter to just the worker (whose `build` script is a no-op).
[phases.build]
cmds = ["pnpm --filter @runspend/ingest build"]
